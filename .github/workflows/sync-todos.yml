name: 同步待办
on:
  push:
    branches: [main]
    paths: ['Inbox/*.md']

permissions:
  contents: write

jobs:
  sync-todos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process inbox todos
        shell: python
        run: |
          import os, re, json
          inbox_dir = 'Inbox'
          todo_dir = '待办总览/待办事项'
          kanban_file = '待办总览/待办看板.md'
          home_file = '首页.md'

          def parse_frontmatter(text):
              m = re.match(r'^---\n(.+?)\n---\n([\s\S]*)$', text, re.DOTALL)
              if not m:
                  return None
              fm = {}
              current_key = None
              for line in m.group(1).split('\n'):
                  kv = re.match(r'^(\w[\w-]*):\s*(.*)$', line)
                  if kv:
                      raw_val = kv.group(2)
                      # Handle inline YAML list: [a, b, c]
                      list_m = re.match(r'^\[([^\]]+)\]$', raw_val)
                      if list_m:
                          fm[kv.group(1)] = [v.strip().strip('\'"') for v in list_m.group(1).split(',')]
                      else:
                          fm[kv.group(1)] = raw_val.strip('\'"')
                      current_key = kv.group(1)
                  elif current_key and re.match(r'^\s+-\s+', line):
                      val = re.sub(r'^\s+-\s+', '', line).strip('\'"')
                      if not isinstance(fm.get(current_key), list):
                          fm[current_key] = [fm[current_key]] if fm.get(current_key) else []
                      fm[current_key].append(val)
              return {'fm': fm, 'body': m.group(2).strip()}

          def get_ym(name):
              m = re.match(r'(\d{4})-(\d{2})-\d{2}-', name)
              if m:
                  return m.group(1), str(int(m.group(2))) + '月'
              return None, None

          files = [f for f in os.listdir(inbox_dir) if f.endswith('.md') and f != '.gitkeep']
          synced = []

          for fname in files:
              fpath = os.path.join(inbox_dir, fname)
              with open(fpath, 'r', encoding='utf-8') as f:
                  text = f.read()
              parsed = parse_frontmatter(text)
              if not parsed:
                  continue
              fm = parsed['fm']
              if fm.get('status', '') != 'inbox':
                  continue
              tags = fm.get('tags', [])
              if isinstance(tags, str):
                  tags = [tags]
              if '待办' not in tags:
                  continue

              body = parsed['body']
              priority = fm.get('priority', '一般')
              prio_map = {'紧急': '紧急', '重要': '重要', '一般': '一般'}
              prio_label = prio_map.get(priority, '一般')

              year, month = get_ym(fname)
              if not year:
                  year, month = '2026', '5月'

              # Copy to 待办事项
              os.makedirs(todo_dir, exist_ok=True)
              dest = os.path.join(todo_dir, fname)
              if not os.path.exists(dest):
                  with open(dest, 'w', encoding='utf-8') as f:
                      f.write(text)

              def add_todo_to_md(filepath, section_marker, todo_line, create_section=False):
                  with open(filepath, 'r', encoding='utf-8') as f:
                      lines = f.readlines()
                  # Find section
                  section_idx = -1
                  for i, line in enumerate(lines):
                      if line.rstrip() == section_marker:
                          section_idx = i
                          break
                  if section_idx < 0:
                      if not create_section:
                          return
                      # Find year section or create before ---
                      year_marker = f'## {year}'
                      yi = -1
                      for i, line in enumerate(lines):
                          if line.rstrip() == year_marker:
                              yi = i
                              break
                      if yi >= 0:
                          # Insert month section after year
                          insert_at = yi + 1
                          while insert_at < len(lines) and lines[insert_at].strip() == '':
                              insert_at += 1
                          lines[insert_at:insert_at] = [f'\n### {month}\n', f'{todo_line}\n']
                      else:
                          # Find --- separator
                          sep_i = -1
                          for i, line in enumerate(lines):
                              if line.rstrip() == '---':
                                  sep_i = i
                                  break
                          insert_at = sep_i if sep_i >= 0 else len(lines)
                          lines[insert_at:insert_at] = [f'\n## {year}\n', f'\n### {month}\n', f'{todo_line}\n']
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.writelines(lines)
                      return
                  # Find last todo in this section (before next ###, ##, or ---)
                  last_todo_idx = -1
                  for i in range(section_idx + 1, len(lines)):
                      line = lines[i].rstrip()
                      if re.match(r'^[-*]\s+\[.\]', line):
                          last_todo_idx = i
                      elif re.match(r'^#{1,3}\s', line) or line == '---':
                          break
                  insert_at = last_todo_idx + 1 if last_todo_idx >= 0 else section_idx + 1
                  # Make sure there's a blank line before the new todo if last line wasn't a todo
                  if last_todo_idx < 0:
                      lines.insert(insert_at, '\n')
                      insert_at += 1
                  lines.insert(insert_at, f'{todo_line}\n')
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.writelines(lines)

              add_todo_to_md(kanban_file, f'### {month}', todo_line, create_section=True)
              add_todo_to_md(home_file, '## 📋 待办', todo_line, create_section=False)

              # Mark inbox as organized
              text = text.replace('status: inbox', 'status: organized')
              with open(fpath, 'w', encoding='utf-8') as f:
                  f.write(text)

              synced.append(fname)

          if synced:
              print('Synced:', ', '.join(synced))
          else:
              print('No new todos')

      - name: Commit & push
        run: |
          git config user.name "捕梦精灵"
          git config user.email "dreamcatcher@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🔄 自动同步待办到看板 [skip ci]"
          git push
